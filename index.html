<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITS Prediction Widget - Sección 9</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
</head>
<body>

    <div id="contenedor-apuesta" class="oculto">
        <div class="top-label">LUDOPATÍA ON</div>

        <div class="header">
            <span class="badge">SECTION 9 SYSTEM</span>
            <h2 id="titulo">WAITING FOR DATA...</h2>
        </div>

        <div class="duelo-container">
            <div id="progreso-si" class="barra si">
                <span id="porcentaje-si" class="perc">50%</span>
            </div>
            <div id="progreso-no" class="barra no">
                <span id="porcentaje-no" class="perc">50%</span>
            </div>
        </div>

        <div class="puntos-container">
            <div class="bando-puntos si-puntos">
                <span class="label">OPCIÓN A</span>
                <span id="puntos-si" class="puntos-num">0 PTS</span>
            </div>
            <div class="bando-puntos no-puntos">
                <span class="label">OPCIÓN B</span>
                <span id="puntos-no" class="puntos-num">0 PTS</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
